name: Deploy Astro to cPanel

on:
  push:
    branches:
      - main # Cambia a 'master' si esa es tu rama principal

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Traer el código del repositorio
      - name: 📥 Checkout del código
        uses: actions/checkout@v4

      # 2. Configurar el entorno de Node.js
      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Usa la versión de Node de tu proyecto

      # 3. Instalar las dependencias
      - name: 📦 Instalar dependencias
        run: npm ci # Cambia a 'yarn install' o 'pnpm install' si usas otro gestor

      # 4. Generar el build estático de Astro
      - name: 🛠️ Build de Astro
        run: npm run build

      # 5. Subir los archivos generados a cPanel vía FTP
      - name: 🚀 Desplegar a cPanel vía FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/ # Carpeta por defecto donde Astro genera el build
          # Ruta de destino en cPanel (cambia si usas un subdominio o carpeta distinta)
          server-dir: /public_html/javascript/  
